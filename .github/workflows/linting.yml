name: Compile Linting

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: read
  statuses: write         
  issues: write      
  pull-requests: write

jobs:
  linting:
    name: Run Super-Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Super-Linter
        uses: super-linter/super-linter@v8.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          VALIDATE_ALL_CODEBASE: false

          # set eslint config 
          LINTER_RULES_PATH: .github/linters
          JAVASCRIPT_ES_CONFIG_FILE: eslint.config.mjs

          VALIDATE_JAVASCRIPT_ES: true
          VALIDATE_HTML: true
          VALIDATE_CSS: true

          # Have Super-Linter generate a summary + try PR comment
          SAVE_SUPER_LINTER_SUMMARY: true
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: true

  browser-console-check:
    name: Browser DevTools Console Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y
          npm i -D @playwright/test
          npx playwright install --with-deps chromium

      - name: Start local server
        run: python3 -m http.server 8080 --bind 127.0.0.1 &

      - name: Run Playwright test
        env:
          CHECK_URL: http://127.0.0.1:8080/index.html
        run: |
          set -o pipefail

          # prevent early exit so we can always generate the cleaned log
          set +e
          npx playwright test .github/linters/console.spec.js --reporter=line 2>&1 | tee raw-playwright.log
          test_exit=${PIPESTATUS[0]}
          set -e

          # strip ANSI characters for clean log 
          sed -r "s/\x1B\[[0-9;]*[A-Za-z]//g" raw-playwright.log > playwright-console.log

          # fail the step if Playwright failed 
          exit $test_exit

      - name: Comment Playwright errors on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const logPath = 'playwright-console.log';
            let body = `## 🧪 DevTools console/page errors\n`;

            if (fs.existsSync(logPath)) {
              const raw = fs.readFileSync(logPath, 'utf8');
              const clipped = raw.length > 60000 ? raw.slice(-60000) : raw;

              body += `
              <details>
              <summary>Show Playwright log</summary>

              \`\`\`
              ${clipped}
              \`\`\`

              </details>`;
            } else {
              body += `
              ⚠️ No Playwright log file was found.

              Please check the **GitHub Actions run log** for full details.
              `;
            }

            body += `\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });